<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Study - Fireworks</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #A2C652;
      --ink: #1f3210;
      --panel: rgba(255, 255, 255, 0.18);
      --panel-border: rgba(255, 255, 255, 0.38);
      --glow: rgba(255, 250, 218, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.28), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(245, 255, 211, 0.22), transparent 24%),
        radial-gradient(circle at 50% 82%, rgba(123, 156, 32, 0.22), transparent 30%);
      mix-blend-mode: screen;
    }

    body::after {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), transparent 40%),
        linear-gradient(315deg, rgba(95, 123, 16, 0.12), transparent 44%);
      opacity: 0.9;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .badge,
    .back-link,
    .note {
      position: absolute;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 30px rgba(76, 100, 20, 0.12);
    }

    .badge,
    .note {
      pointer-events: none;
    }

    .badge {
      top: 18px;
      left: 18px;
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .back-link {
      right: 18px;
      top: 18px;
      padding: 10px 14px;
      color: inherit;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      pointer-events: auto;
      transition: transform 180ms ease, background 180ms ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.24);
    }

    .note {
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 10px 16px;
      font-size: 12px;
      letter-spacing: 0.06em;
      white-space: nowrap;
      max-width: calc(100vw - 36px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 640px) {
      .badge,
      .back-link,
      .note {
        border-radius: 18px;
      }

      .badge,
      .back-link {
        top: 14px;
        padding: 9px 12px;
        font-size: 11px;
      }

      .badge {
        left: 14px;
        max-width: 54vw;
      }

      .back-link {
        right: 14px;
      }

      .note {
        bottom: 14px;
        font-size: 11px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="hud" aria-hidden="true">
    <div class="badge">Processing Study / Sketch 2902086</div>
    <a class="back-link" href="./index.html">返回原烟花页</a>
    <div class="note">保留原页面不变，这一页是单独重写的 Processing 风格练习版本。</div>
  </div>
  <canvas id="scene" aria-label="Processing 风格烟花画面"></canvas>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const DPR_LIMIT = 2;
    const TAU = Math.PI * 2;
    const BACKGROUND = "#A2C652";
    const palette = ["#FFF7D6", "#FFFFFF", "#FF7A59", "#F04E30", "#243B19"];

    let dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
    let width = 0;
    let height = 0;
    let frameCount = 0;
    let emitter = { x: 0, y: 0 };
    let rodStart = { x: 0, y: 0 };
    let particles = [];
    let embers = [];
    let autoBurstTimer = 0;
    let rafId = 0;

    function setup() {
      resizeScene();
      seedEmbers();
      draw();
    }

    function resizeScene() {
      dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
      width = window.innerWidth;
      height = window.innerHeight;

      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      emitter = {
        x: width * 0.52,
        y: height * 0.36
      };

      rodStart = {
        x: width * 0.34,
        y: height * 1.08
      };
    }

    function seedEmbers() {
      embers = [];
      const total = Math.max(28, Math.floor(width * 0.04));

      for (let i = 0; i < total; i += 1) {
        embers.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: random(1.5, 4.2),
          alpha: random(0.08, 0.28),
          drift: random(0.15, 0.55),
          offset: Math.random() * 200
        });
      }
    }

    function draw() {
      frameCount += 1;
      autoBurstTimer += 1;

      paintBackground();
      drawPosterFrame();
      drawRod();
      updateEmbers();
      emitSparkCore();

      if (autoBurstTimer > 10) {
        spawnBurst(randomInt(2, 5));
        autoBurstTimer = 0;
      }

      updateParticles();
      drawCoreGlow();
      drawLabels();

      rafId = requestAnimationFrame(draw);
    }

    function paintBackground() {
      ctx.fillStyle = BACKGROUND;
      ctx.fillRect(0, 0, width, height);

      const glowA = ctx.createRadialGradient(width * 0.22, height * 0.22, 0, width * 0.22, height * 0.22, width * 0.24);
      glowA.addColorStop(0, "rgba(255,255,255,0.22)");
      glowA.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = glowA;
      ctx.fillRect(0, 0, width, height);

      const glowB = ctx.createRadialGradient(width * 0.72, height * 0.26, 0, width * 0.72, height * 0.26, width * 0.28);
      glowB.addColorStop(0, "rgba(243,248,188,0.22)");
      glowB.addColorStop(1, "rgba(243,248,188,0)");
      ctx.fillStyle = glowB;
      ctx.fillRect(0, 0, width, height);
    }

    function drawPosterFrame() {
      const frameWidth = Math.min(width * 0.72, height * 0.76 * 0.72);
      const frameHeight = Math.min(height * 0.82, width * 1.12);
      const x = (width - frameWidth) * 0.5;
      const y = (height - frameHeight) * 0.5;
      const radius = Math.min(32, frameWidth * 0.06);

      ctx.save();
      roundRect(x, y, frameWidth, frameHeight, radius);
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fill();
      ctx.lineWidth = Math.max(1.2, frameWidth * 0.004);
      ctx.strokeStyle = "rgba(255,255,255,0.28)";
      ctx.stroke();
      ctx.restore();
    }

    function drawRod() {
      const scale = Math.min(width, height) / 900;
      ctx.save();
      ctx.strokeStyle = "#243B19";
      ctx.lineWidth = Math.max(5, 8 * scale);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(rodStart.x, rodStart.y);
      ctx.lineTo(emitter.x, emitter.y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.78)";
      ctx.lineWidth = Math.max(1.2, 2.2 * scale);
      const dx = emitter.x - rodStart.x;
      const dy = emitter.y - rodStart.y;
      const length = Math.hypot(dx, dy);
      const nx = -dy / length;
      const ny = dx / length;
      const spacing = Math.max(7, 11 * scale);
      const slash = Math.max(3.5, 6 * scale);

      for (let dist = 0; dist < length; dist += spacing) {
        const t = dist / length;
        const px = rodStart.x + dx * t;
        const py = rodStart.y + dy * t;
        ctx.beginPath();
        ctx.moveTo(px - nx * slash, py - ny * slash);
        ctx.lineTo(px + nx * slash, py + ny * slash);
        ctx.stroke();
      }
      ctx.restore();
    }

    function emitSparkCore() {
      for (let i = 0; i < 3; i += 1) {
        particles.push(createParticle(false));
      }
    }

    function createParticle(isBurst) {
      const angle = Math.random() * TAU;
      const speed = isBurst ? random(2.8, 7.8) : random(0.8, 3.2);
      const drag = isBurst ? 0.982 : 0.968;
      const upwardBias = isBurst ? random(-0.6, 0.24) : random(-0.75, 0.12);
      const kindRoll = Math.random();

      let type = "dot";
      if (kindRoll > 0.7) type = "streak";
      if (kindRoll > 0.88) type = "ring";

      return {
        x: emitter.x,
        y: emitter.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed + upwardBias,
        drag,
        gravity: isBurst ? 0.012 : 0.02,
        life: isBurst ? random(48, 78) : random(22, 40),
        maxLife: 80,
        size: isBurst ? random(2.2, 5.2) : random(1.2, 3.8),
        color: palette[randomInt(0, palette.length - 1)],
        type,
        trail: [],
        spin: random(-0.08, 0.08)
      };
    }

    function spawnBurst(count) {
      for (let i = 0; i < count; i += 1) {
        particles.push(createParticle(true));
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const particle = particles[i];
        particle.vx *= particle.drag;
        particle.vy *= particle.drag;
        particle.vy += particle.gravity;
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.life -= 1;
        particle.trail.push({ x: particle.x, y: particle.y });

        if (particle.trail.length > 8) {
          particle.trail.shift();
        }

        drawParticle(particle);

        if (particle.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticle(particle) {
      const alpha = clamp(particle.life / particle.maxLife, 0, 1);

      if (particle.type === "streak" && particle.trail.length > 1) {
        ctx.save();
        ctx.beginPath();
        ctx.lineWidth = Math.max(1, particle.size * 0.55);
        ctx.lineCap = "round";
        particle.trail.forEach((point, index) => {
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        });
        ctx.strokeStyle = withAlpha(particle.color, alpha * 0.85);
        ctx.stroke();
        ctx.restore();
      }

      if (particle.type === "ring") {
        ctx.save();
        ctx.translate(particle.x, particle.y);
        ctx.rotate(frameCount * particle.spin);
        ctx.strokeStyle = withAlpha(particle.color, alpha * 0.88);
        ctx.lineWidth = Math.max(1, particle.size * 0.35);
        ctx.beginPath();
        ctx.arc(0, 0, particle.size * 0.9, 0, TAU);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-particle.size, 0);
        ctx.lineTo(particle.size, 0);
        ctx.moveTo(0, -particle.size);
        ctx.lineTo(0, particle.size);
        ctx.stroke();
        ctx.restore();
        return;
      }

      ctx.save();
      ctx.fillStyle = withAlpha(particle.color, alpha);
      ctx.beginPath();
      ctx.arc(particle.x, particle.y, particle.size, 0, TAU);
      ctx.fill();
      ctx.restore();
    }

    function updateEmbers() {
      embers.forEach((ember, index) => {
        const pulse = Math.sin((frameCount + ember.offset) * 0.03) * 0.5 + 0.5;
        ember.y -= ember.drift * 0.08;
        if (ember.y < -12) {
          ember.y = height + 12;
          ember.x = Math.random() * width;
        }

        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, " + (ember.alpha + pulse * 0.08) + ")";
        ctx.beginPath();
        ctx.arc(ember.x, ember.y, ember.size * (0.8 + pulse * 0.4), 0, TAU);
        ctx.fill();
        ctx.restore();

        if (index % 7 === 0 && Math.random() < 0.015) {
          particles.push({
            x: ember.x,
            y: ember.y,
            vx: random(-0.35, 0.35),
            vy: random(-0.45, 0.2),
            drag: 0.992,
            gravity: 0.002,
            life: random(24, 36),
            maxLife: 40,
            size: random(0.8, 1.8),
            color: "#FFFFFF",
            type: "dot",
            trail: [],
            spin: 0
          });
        }
      });
    }

    function drawCoreGlow() {
      const pulse = Math.sin(frameCount * 0.24) * 0.5 + 0.5;

      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.beginPath();
      ctx.arc(emitter.x, emitter.y, 4 + pulse * 3.5, 0, TAU);
      ctx.fill();

      ctx.fillStyle = "rgba(255,250,218,0.42)";
      ctx.beginPath();
      ctx.arc(emitter.x, emitter.y, 12 + pulse * 12, 0, TAU);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(emitter.x - 11 - pulse * 4, emitter.y);
      ctx.lineTo(emitter.x + 11 + pulse * 4, emitter.y);
      ctx.moveTo(emitter.x, emitter.y - 11 - pulse * 4);
      ctx.lineTo(emitter.x, emitter.y + 11 + pulse * 4);
      ctx.stroke();
      ctx.restore();
    }

    function drawLabels() {
      const scale = Math.min(width, height) / 900;

      ctx.save();
      ctx.fillStyle = "rgba(31, 50, 16, 0.9)";
      ctx.textBaseline = "top";
      ctx.font = "700 " + Math.max(26, 36 * scale) + "px Arial";
      ctx.fillText("FIREWORKS", width * 0.19, height * 0.18);

      ctx.font = "400 " + Math.max(12, 15 * scale) + "px Arial";
      ctx.fillText("Processing style study / independent page", width * 0.19, height * 0.23);

      ctx.textAlign = "right";
      ctx.font = "700 " + Math.max(13, 16 * scale) + "px Arial";
      ctx.fillText("SKETCH GLOWING / BURNING / FADING", width * 0.81, height * 0.78);

      ctx.textAlign = "left";
      ctx.font = "400 " + Math.max(12, 14 * scale) + "px Arial";
      ctx.fillText("background: #A2C652", width * 0.19, height * 0.81);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomInt(min, max) {
      return Math.floor(random(min, max + 1));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function withAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return "rgba(" + r + "," + g + "," + b + "," + clamp(alpha, 0, 1) + ")";
    }

    window.addEventListener("resize", () => {
      resizeScene();
      seedEmbers();
    });

    window.addEventListener("pointerdown", (event) => {
      emitter.x = event.clientX;
      emitter.y = event.clientY;
      spawnBurst(28);
    });

    window.addEventListener("beforeunload", () => {
      cancelAnimationFrame(rafId);
    });

    setup();
  </script>
</body>
</html>
