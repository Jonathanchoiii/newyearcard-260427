<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新年贺卡 - 烟花开启</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 64, 129, 0.22), transparent 26%),
        radial-gradient(circle at 78% 24%, rgba(130, 90, 255, 0.18), transparent 24%),
        radial-gradient(circle at 48% 80%, rgba(255, 120, 170, 0.12), transparent 28%),
        linear-gradient(180deg, #050505 0%, #0b0b12 52%, #040404 100%);
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -18%;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.8;
      filter: blur(36px);
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(ellipse at 24% 26%, rgba(255, 74, 138, 0.28), transparent 24%),
        radial-gradient(ellipse at 72% 38%, rgba(98, 120, 255, 0.16), transparent 22%),
        radial-gradient(ellipse at 48% 72%, rgba(255, 180, 220, 0.14), transparent 18%);
      animation: driftOne 14s ease-in-out infinite alternate;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 22%, rgba(255, 105, 180, 0.12) 40%, transparent 58%),
        linear-gradient(245deg, transparent 30%, rgba(118, 92, 255, 0.1) 50%, transparent 68%);
      filter: blur(48px);
      animation: driftTwo 18s ease-in-out infinite alternate;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      isolation: isolate;
      perspective: 1800px;
    }

    .stage,
    .cover {
      position: absolute;
      inset: 0;
    }

    .stage {
      z-index: 1;
      opacity: 0;
      transform: scale(1.025);
      transition: opacity 900ms ease, transform 1200ms cubic-bezier(0.22, 1, 0.36, 1);
      background: linear-gradient(180deg, #e4002b 0%, #f0648c 100%);
    }

    .stage canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover {
      z-index: 2;
      left: 50%;
      top: 50%;
      cursor: pointer;
      overflow: visible;
      border-radius: 10px;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      transform-style: preserve-3d;
      will-change: transform, opacity, filter;
      transition:
        opacity 880ms ease,
        transform 1100ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 880ms ease;
    }

    .cover-shell {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 64%, rgba(255, 255, 255, 0.05), transparent 24%),
        linear-gradient(180deg, #ff4684 0%, #ff3e7d 100%);
      box-shadow: 0 18px 42px rgba(84, 8, 35, 0.22);
    }

    .cover-shell::before {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      top: -10%;
      height: 43%;
      background: #F34679;
      border-bottom-left-radius: 50% 42%;
      border-bottom-right-radius: 50% 42%;
      z-index: 0;
      transform-origin: 50% 0%;
      backface-visibility: hidden;
      will-change: transform, opacity, filter;
      transition:
        transform 760ms cubic-bezier(0.2, 0.8, 0.2, 1),
        opacity 500ms ease,
        filter 760ms ease;
    }

    .cover-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.08), transparent 16%);
      pointer-events: none;
    }

    .mist {
      position: absolute;
      inset: 42% 0 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 0, 85, 0.26), transparent 18%),
        radial-gradient(circle at 80% 22%, rgba(255, 0, 90, 0.2), transparent 18%),
        radial-gradient(circle at 50% 44%, rgba(255, 170, 190, 0.12), transparent 22%),
        linear-gradient(180deg, rgba(255, 80, 140, 0) 0%, rgba(255, 30, 95, 0.2) 100%);
      filter: blur(8px);
      opacity: 0.75;
      z-index: 0;
    }

    .marquee {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.92;
    }

    .marquee.top {
      top: 18px;
    }

    .marquee.bottom {
      bottom: 18px;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      gap: 26px;
      animation: marqueeLeft 18s linear infinite;
    }

    .marquee.bottom .marquee-track {
      animation-name: marqueeRight;
      animation-duration: 20s;
    }

    .marquee-text {
      flex: 0 0 auto;
      font-family: "Courier New", "Lucida Console", monospace;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.18em;
      color: rgba(255, 241, 247, 0.88);
      text-transform: uppercase;
      text-shadow:
        0 0 0 rgba(255, 255, 255, 0.8),
        1px 0 0 rgba(255, 205, 232, 0.48),
        0 1px 0 rgba(255, 205, 232, 0.48);
      white-space: nowrap;
    }

    .marquee {
      transition: opacity 320ms ease, transform 420ms ease;
    }

    main.is-opening .marquee-track {
      animation-play-state: paused;
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 25%;
      width: 19.5%;
      aspect-ratio: 1;
      transform: translateX(-50%);
      z-index: 2;
      animation: pulse 2.2s ease-in-out infinite;
    }

    .seal::before,
    .seal::after,
    .seal span::before,
    .seal span::after {
      content: "";
      position: absolute;
      background: #f6d182;
      border-radius: 999px;
      inset: 0;
    }

    .seal::before { transform: translateY(-22%); }
    .seal::after { transform: translateY(22%); }
    .seal span::before { transform: translateX(-22%); }
    .seal span::after { transform: translateX(22%); }

    .corner {
      position: absolute;
      z-index: 3;
      margin: 0;
      color: #fff;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .top-left { left: 4.2%; top: 2.2%; }
    .top-right { right: 4.2%; top: 2.2%; }
    .bottom-left { left: 4.2%; bottom: 3.4%; }
    .bottom-right { right: 4.2%; bottom: 3.4%; }

    .prompt,
    .hint {
      position: absolute;
      left: 50%;
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      transform: translateX(-50%);
      z-index: 3;
      white-space: nowrap;
    }

    .prompt {
      top: 51.3%;
      font-weight: 300;
      letter-spacing: 0.38em;
      animation: breathe 1.8s ease-in-out infinite;
    }

    .hint {
      bottom: 7%;
      color: rgba(255, 255, 255, 0.68);
      letter-spacing: 0.12em;
    }

    .cover-bloom {
      position: absolute;
      left: 50%;
      bottom: 16%;
      width: 72%;
      height: 28%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 22%),
        radial-gradient(circle at 50% 70%, rgba(255, 0, 102, 0.16), transparent 44%);
      filter: blur(12px);
      z-index: 1;
    }

    .cover-lower-art {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 20, 105, 0) 0%, rgba(255, 44, 120, 0.1) 18%, rgba(255, 58, 128, 0.22) 100%);
    }

    .cover-lower-art::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 24%;
      width: 54%;
      height: 48%;
      transform: translateX(-50%);
      border-radius: 10px;
      background:
        radial-gradient(circle at 35% 68%, rgba(222, 45, 110, 0.28), transparent 12%),
        linear-gradient(180deg, rgba(255, 92, 152, 0.5), rgba(255, 76, 140, 0.3));
      box-shadow:
        0 0 90px rgba(255, 88, 145, 0.35),
        inset 0 0 80px rgba(255, 150, 190, 0.12);
      filter: blur(22px);
      opacity: 0.72;
    }

    .cover-lower-art::after {
      content: "";
      position: absolute;
      inset: 6% 0 0;
      background:
        linear-gradient(180deg, transparent 0%, rgba(255, 90, 150, 0.1) 20%, transparent 26%, rgba(255, 95, 155, 0.14) 34%, transparent 42%, rgba(255, 96, 159, 0.16) 58%, transparent 68%),
        linear-gradient(180deg, transparent 74%, rgba(255, 177, 205, 0.45) 78%, rgba(255, 95, 150, 0.18) 83%, rgba(255, 56, 132, 0.4) 92%, transparent 100%);
      filter: blur(6px);
      opacity: 0.95;
    }

    .cover-lower-glow,
    .cover-lower-bands {
      position: absolute;
      inset: auto 0 0;
      pointer-events: none;
      z-index: 1;
    }

    .cover-lower-glow {
      height: 62%;
      background:
        radial-gradient(circle at 16% 42%, rgba(255, 35, 108, 0.28), transparent 18%),
        radial-gradient(circle at 84% 46%, rgba(255, 44, 118, 0.24), transparent 18%),
        radial-gradient(circle at 50% 75%, rgba(255, 180, 220, 0.18), transparent 14%);
      filter: blur(18px);
      opacity: 0.9;
    }

    .cover-lower-bands {
      height: 32%;
      background:
        linear-gradient(180deg, transparent 0%, rgba(255, 120, 176, 0.18) 22%, rgba(255, 215, 230, 0.42) 40%, rgba(255, 65, 138, 0.25) 58%, rgba(255, 20, 108, 0.42) 82%, transparent 100%);
      filter: blur(10px);
      opacity: 0.95;
    }

    .cover-copy {
      position: absolute;
      left: 50%;
      bottom: 12%;
      z-index: 3;
      width: 78%;
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateX(-50%) translateY(24px);
      transition: opacity 600ms ease, transform 760ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .audio-controls {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 4;
      display: flex;
      align-items: center;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 320ms ease, transform 420ms ease;
      pointer-events: none;
    }

    .audio-button {
      border: 0;
      border-radius: 999px;
      width: 44px;
      height: 44px;
      padding: 0;
      font: inherit;
      color: #fff;
      background: rgba(10, 10, 14, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .audio-button {
      cursor: pointer;
    }

    .audio-button.is-muted {
      background: rgba(120, 24, 44, 0.42);
    }

    .audio-button svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    main.is-opening .cover-shell::before {
      transform: translateY(-16%) rotateX(-82deg) scaleY(1.06);
      filter: brightness(0.96);
    }

    main.is-opening .prompt,
    main.is-opening .hint,
    main.is-opening .seal,
    main.is-opening .corner {
      transition:
        opacity 360ms ease,
        transform 760ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    main.is-opening .prompt,
    main.is-opening .hint {
      opacity: 0.4;
      transform: translateX(-50%) translateY(12px);
    }

    main.is-opening .seal {
      transform: translateX(-50%) translateY(10px) scale(0.98);
    }

    main.is-opening .corner {
      opacity: 0.82;
    }

    main.is-launching .cover {
      opacity: 0;
      transform: translate(-50%, -66%) scale(0.54) rotate(-10deg);
      filter: blur(6px);
      pointer-events: none;
    }

    main.is-launching .marquee,
    main.is-open .marquee {
      opacity: 0;
      transform: translateY(-8px);
      transition-delay: 0.2s;
    }

    main.is-open .marquee.bottom {
      transform: translateY(8px);
    }

    main.is-open .cover {
      opacity: 0;
      transform: translate(-50%, -76%) scale(0.34) rotate(-13deg);
      filter: blur(10px);
      pointer-events: none;
    }

    main.is-launching .stage,
    main.is-open .stage {
      opacity: 1;
      transform: scale(1);
    }

    main.is-open .cover-copy {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    main.is-open .audio-controls {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.035); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.62; }
      50% { opacity: 1; }
    }

    @keyframes driftOne {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1);
      }
      100% {
        transform: translate3d(2%, 2%, 0) scale(1.06);
      }
    }

    @keyframes driftTwo {
      0% {
        transform: translate3d(3%, -2%, 0) rotate(0deg);
      }
      100% {
        transform: translate3d(-3%, 2%, 0) rotate(8deg);
      }
    }

    @keyframes marqueeLeft {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    @keyframes marqueeRight {
      from {
        transform: translateX(-50%);
      }
      to {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <main id="experience" aria-label="新年贺卡体验">
    <div class="marquee top" aria-hidden="true">
      <div class="marquee-track">
        <span class="marquee-text">HAPPY NEW YEAR HAPPY NEW YEAR HAPPY NEW YEAR</span>
        <span class="marquee-text">HAPPY NEW YEAR HAPPY NEW YEAR HAPPY NEW YEAR</span>
      </div>
    </div>

    <div class="marquee bottom" aria-hidden="true">
      <div class="marquee-track">
        <span class="marquee-text">HAPPY NEW YEAR HAPPY NEW YEAR HAPPY NEW YEAR</span>
        <span class="marquee-text">HAPPY NEW YEAR HAPPY NEW YEAR HAPPY NEW YEAR</span>
      </div>
    </div>

    <section class="stage" id="stage" aria-hidden="true">
      <canvas id="fireworks"></canvas>
      <div class="audio-controls" aria-label="音乐控制">
        <button class="audio-button" id="mute-button" type="button" aria-pressed="false" aria-label="静音">
          <svg id="mute-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 10v4h4l5 4V6L8 10H4z"></path>
            <path d="M16 9a5 5 0 0 1 0 6"></path>
            <path d="M19 6a9 9 0 0 1 0 12"></path>
          </svg>
        </button>
      </div>
    </section>

    <section class="cover" id="cover" aria-label="新年贺卡封面">
      <div class="cover-shell">
        <div class="mist"></div>
        <div class="seal"><span></span></div>

        <p class="corner top-left">新</p>
        <p class="corner top-right">年</p>
        <p class="corner bottom-left">贺</p>
        <p class="corner bottom-right">卡</p>

        <p class="prompt">点 击 开 启</p>
        <p class="hint">打开后将进入烟花页</p>
        <div class="cover-lower-art"></div>
        <div class="cover-lower-glow"></div>
        <div class="cover-lower-bands"></div>
        <div class="cover-bloom"></div>
        <p class="cover-copy">愿你在 2026 的每一天，都有新愿望被点亮，也有旧心事被温柔安放。</p>
      </div>
    </section>
  </main>

  <script>
    const experience = document.getElementById("experience");
    const cover = document.getElementById("cover");
    const canvas = document.getElementById("fireworks");
    const muteButton = document.getElementById("mute-button");
    const muteIcon = document.getElementById("mute-icon");
    const ctx = canvas.getContext("2d");
    const particles = [];
    const ripples = [];
    const palette = ["#FFFFFF", "#FFF066", "#A0E0FF", "#FFB3D9"];
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let opened = false;
    let animationId = 0;
    let frame = 0;
    let stickTop = { x: 0, y: 0 };
    let stickBottom = { x: 0, y: 0 };
    let contentWidth = 0;
    let contentLeft = 0;
    let coverWidth = 0;
    let coverHeight = 0;
    let previewAudio = null;
    let previewUrl = "";
    let previewReady = false;
    let previewMuted = false;
    let previewStarted = false;
    let openingStarted = false;
    const previewPromise = fetchApplePreview();

    function layout() {
      width = window.innerWidth;
      height = window.innerHeight;
      contentWidth = Math.min(width, height * 0.75);
      contentLeft = (width - contentWidth) * 0.5;
      coverWidth = Math.min(width * 0.8, height * 0.8 * (477 / 683));
      coverHeight = coverWidth / (477 / 683);

      experience.style.width = width + "px";
      experience.style.height = height + "px";
      cover.style.width = Math.round(coverWidth) + "px";
      cover.style.height = Math.round(coverHeight) + "px";

      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      updateTypography();
      setStickPoints();
    }

    function updateTypography() {
      const corners = experience.querySelectorAll(".corner");
      const cornerSize = Math.max(44, Math.min(60, contentWidth * 0.1258));
      corners.forEach((node) => {
        node.style.fontSize = cornerSize + "px";
      });

      document.querySelector(".prompt").style.fontSize = Math.max(18, Math.min(24, contentWidth * 0.05)) + "px";
      document.querySelector(".hint").style.fontSize = Math.max(12, Math.min(15, contentWidth * 0.031)) + "px";
      document.querySelector(".cover-copy").style.fontSize = Math.max(16, Math.min(20, contentWidth * 0.042)) + "px";
    }

    function setStickPoints() {
      stickTop.x = contentLeft + contentWidth * 0.55;
      stickTop.y = height * 0.37;
      stickBottom.x = contentLeft + contentWidth * 0.35;
      stickBottom.y = height * 1.01;
    }

    function drawGradientBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#E4002B");
      gradient.addColorStop(1, "#F0648C");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function drawTypography() {
      const scale = contentWidth / 500;

      ctx.fillStyle = "#FFFFFF";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "700 " + 40 * scale + "px Arial";
      ctx.fillText("HAPPY NEW YEAR!", contentLeft + 25 * scale, 30 * scale);

      ctx.font = "400 " + 14 * scale + "px Arial";
      ctx.fillText("MAY ALL YOUR WISHES COME TRUE", contentLeft + 28 * scale, 75 * scale);

      ctx.textAlign = "right";
      ctx.font = "700 " + 65 * scale + "px Arial";
      ctx.fillText("#", contentLeft + contentWidth - 25 * scale, 20 * scale);

      ctx.save();
      ctx.translate(contentLeft + 35 * scale, height * 0.55);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "400 " + 16 * scale + "px Arial";
      ctx.fillText("L O V E   S P A R K S   F L Y", 0, 0);
      ctx.restore();

      ctx.save();
      ctx.translate(contentLeft + contentWidth - 35 * scale, height * 0.45);
      ctx.rotate(Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "400 " + 16 * scale + "px Arial";
      ctx.fillText("B U R N I N G   G L O W I N G   F A D I N G", 0, 0);
      ctx.restore();

      ctx.fillStyle = "#C70039";
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.font = "700 " + 35 * scale + "px Arial";
      ctx.fillText("(Fireworks)", contentLeft + 25 * scale, height - 70 * scale);

      ctx.fillStyle = "#FFFFFF";
      ctx.font = "400 " + 12 * scale + "px Arial";
      const lines = ["WRITING NEON DREAMS", "UPON THE VELVET SKY."];
      lines.forEach((line, index) => {
        ctx.fillText(line, contentLeft + 28 * scale, height - (50 - index * 16) * scale);
      });

      ctx.fillStyle = "#C70039";
      ctx.textAlign = "right";
      ctx.font = "700 " + 14 * scale + "px Arial";
      const rightLines = [
        "EVEN THE SMALLEST SPARK CAN",
        "ILLUMINATE THE DEEPEST DARK NIGHT"
      ];
      rightLines.forEach((line, index) => {
        ctx.fillText(line, contentLeft + contentWidth - 25 * scale, height - (50 - index * 16) * scale);
      });
    }

    function drawStick() {
      const scale = contentWidth / 500;
      const dx = stickBottom.x - stickTop.x;
      const dy = stickBottom.y - stickTop.y;
      const len = Math.hypot(dx, dy);
      const nx = -dy / len;
      const ny = dx / len;
      const offset = 4 * scale;

      ctx.strokeStyle = "#141414";
      ctx.lineWidth = 6 * scale;
      ctx.lineCap = "square";
      ctx.beginPath();
      ctx.moveTo(stickTop.x, stickTop.y);
      ctx.lineTo(stickBottom.x, stickBottom.y);
      ctx.stroke();

      ctx.strokeStyle = "#FFFFFF";
      ctx.lineWidth = 2 * scale;
      const dashCount = Math.floor(len / 8);
      for (let i = 0; i < dashCount; i++) {
        const t = i / dashCount;
        const px = stickTop.x + dx * t;
        const py = stickTop.y + dy * t;
        ctx.beginPath();
        ctx.moveTo(px - nx * offset, py - ny * offset);
        ctx.lineTo(px + nx * offset, py + ny * offset);
        ctx.stroke();
      }
    }

    function createParticle(x, y, burst) {
      let angle = Math.random() * Math.PI * 2 - Math.PI;
      angle += randomRange(-0.2, 0.2);
      const speed = burst ? randomRange(5, 14) : randomRange(2, 8);
      const vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      if (vy > 0) {
        vy *= randomRange(0.2, 0.8);
      }

      const particle = {
        x,
        y,
        vx,
        vy,
        ax: 0,
        ay: 0.08,
        life: 255,
        decay: randomRange(3, 7),
        size: randomRange(2, 6) * (width / 500),
        color: palette[Math.floor(Math.random() * palette.length)],
        history: []
      };

      const r = Math.random();
      if (r < 0.5) particle.type = "dotted";
      else if (r < 0.75) particle.type = "streak";
      else if (r < 0.85) particle.type = "letter";
      else particle.type = "dot";

      if (particle.type === "letter") {
        particle.char = letters[Math.floor(Math.random() * letters.length)];
        particle.size = randomRange(8, 14) * (width / 500);
        particle.decay = randomRange(2, 4);
      }

      return particle;
    }

    function createRipple(x, y) {
      ripples.push({
        x,
        y,
        radius: 0,
        maxRadius: randomRange(68, 122),
        alpha: randomRange(0.26, 0.46),
        lineWidth: randomRange(1.8, 3.1),
        growth: randomRange(3.4, 5.8)
      });
    }

    function createInteractiveBurst(x, y) {
      createRipple(x, y);
      createRipple(x + randomRange(-18, 18), y + randomRange(-12, 12));

      for (let i = 0; i < 24; i++) {
        particles.push(createParticle(x, y, true));
      }
    }

    function updateParticle(particle) {
      particle.vx *= 0.94;
      particle.vy *= 0.94;
      particle.vx += particle.ax;
      particle.vy += particle.ay;
      particle.x += particle.vx;
      particle.y += particle.vy;
      particle.life -= particle.decay;

      if (particle.type === "dotted" || particle.type === "streak") {
        particle.history.forEach((point) => {
          point.alpha -= particle.decay * 1.5;
        });
        particle.history = particle.history.filter((point) => point.alpha > 0);

        if (particle.life > 0) {
          const minDist = particle.type === "dotted" ? 12 : 2;
          const last = particle.history[particle.history.length - 1];
          if (!last || distance(particle.x, particle.y, last.x, last.y) > minDist) {
            particle.history.push({ x: particle.x, y: particle.y, alpha: 255 });
          }
        }
      }
    }

    function drawParticle(particle) {
      if (particle.type === "dotted") {
        particle.history.forEach((point) => {
          ctx.fillStyle = withAlpha(particle.color, point.alpha * 0.8 / 255);
          ctx.beginPath();
          ctx.arc(point.x, point.y, particle.size * 0.35, 0, Math.PI * 2);
          ctx.fill();
        });
        if (particle.life > 0) {
          ctx.fillStyle = withAlpha(particle.color, particle.life / 255);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
        return;
      }

      if (particle.type === "streak") {
        if (particle.history.length > 1) {
          ctx.lineWidth = particle.size * 0.5;
          ctx.lineCap = "round";
          ctx.beginPath();
          particle.history.forEach((point, index) => {
            if (index === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          });
          ctx.strokeStyle = withAlpha(particle.color, 0.75);
          ctx.stroke();
        }
        if (particle.life > 0) {
          ctx.fillStyle = withAlpha(particle.color, particle.life / 255);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
        return;
      }

      if (particle.type === "letter") {
        if (particle.life > 0) {
          ctx.fillStyle = "rgba(255,255,255," + (particle.life / 255) + ")";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = particle.size + "px Arial";
          ctx.fillText(particle.char, particle.x, particle.y);
        }
        return;
      }

      if (particle.life > 0) {
        ctx.fillStyle = withAlpha(particle.color, particle.life / 255);
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBurnCore() {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.beginPath();
      ctx.arc(stickTop.x, stickTop.y, randomRange(3, 6), 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.24)";
      ctx.beginPath();
      ctx.arc(stickTop.x, stickTop.y, randomRange(8, 15), 0, Math.PI * 2);
      ctx.fill();
    }

    function updateAndDrawRipples() {
      for (let i = ripples.length - 1; i >= 0; i -= 1) {
        const ripple = ripples[i];
        ripple.radius += ripple.growth;
        ripple.alpha *= 0.965;

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = "rgba(255, 246, 252," + ripple.alpha + ")";
        ctx.lineWidth = ripple.lineWidth;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 214, 236," + ripple.alpha * 0.68 + ")";
        ctx.lineWidth = ripple.lineWidth * 0.72;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius * 0.72, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        if (ripple.radius >= ripple.maxRadius || ripple.alpha < 0.02) {
          ripples.splice(i, 1);
        }
      }
    }

    function render() {
      frame += 1;
      drawGradientBackground();
      drawTypography();
      drawStick();

      for (let i = 0; i < 4; i++) {
        particles.push(createParticle(stickTop.x, stickTop.y, false));
      }

      if (frame % 12 === 0) {
        for (let i = 0; i < 25; i++) {
          particles.push(createParticle(stickTop.x, stickTop.y, true));
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        updateParticle(particle);
        drawParticle(particle);
        if (particle.life <= 0 && particle.history.length === 0) {
          particles.splice(i, 1);
        }
      }

      updateAndDrawRipples();
      drawBurnCore();
      animationId = requestAnimationFrame(render);
    }

    function startFireworks() {
      if (animationId) return;
      render();
    }

    async function fetchApplePreview() {
      const endpoints = [
        "https://itunes.apple.com/search?term=" + encodeURIComponent("与非门 Happy New Year") + "&entity=song&country=cn&limit=10",
        "https://itunes.apple.com/search?term=" + encodeURIComponent("YuFeiMen Happy New Year") + "&entity=song&country=us&limit=10"
      ];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint);
          if (!response.ok) continue;
          const data = await response.json();
          const match = (data.results || []).find((item) => {
            const trackName = (item.trackName || "").toLowerCase();
            const artistName = (item.artistName || "").toLowerCase();
            return item.previewUrl &&
              trackName.includes("happy new year") &&
              (artistName.includes("与非门") || artistName.includes("yufeimen"));
          }) || (data.results || []).find((item) => item.previewUrl);

          if (match && match.previewUrl) {
            previewUrl = match.previewUrl;
            previewReady = true;
            return match;
          }
        } catch (error) {
          // Ignore and continue with fallback endpoint.
        }
      }

      return null;
    }

    async function startPreviewAudio() {
      if (previewStarted || !previewReady || !previewUrl) return;
      previewStarted = true;

      try {
        previewAudio = new Audio(previewUrl);
        previewAudio.preload = "auto";
        previewAudio.crossOrigin = "anonymous";
        previewAudio.loop = true;
        previewAudio.muted = previewMuted;
        previewAudio.volume = 1;
        await previewAudio.play();
      } catch (error) {
        previewStarted = false;
        muteButton.setAttribute("aria-label", "播放失败");
      }
    }

    function toggleMute() {
      previewMuted = !previewMuted;
      muteButton.setAttribute("aria-pressed", String(previewMuted));
      muteButton.setAttribute("aria-label", previewMuted ? "取消静音" : "静音");
      muteButton.classList.toggle("is-muted", previewMuted);
      muteIcon.innerHTML = previewMuted
        ? '<path d="M4 10v4h4l5 4V6L8 10H4z"></path><path d="M16.5 9.5l5 5"></path><path d="M21.5 9.5l-5 5"></path>'
        : '<path d="M4 10v4h4l5 4V6L8 10H4z"></path><path d="M16 9a5 5 0 0 1 0 6"></path><path d="M19 6a9 9 0 0 1 0 12"></path>';

      if (previewAudio) {
        previewAudio.muted = previewMuted;
      }
    }

    cover.addEventListener("click", async () => {
      if (openingStarted) return;
      openingStarted = true;

      experience.classList.add("is-opening");
      await previewPromise;
      startPreviewAudio();

      window.setTimeout(() => {
        experience.classList.add("is-launching");
        startFireworks();
      }, 680);

      window.setTimeout(() => {
        opened = true;
        experience.classList.add("is-open");
      }, 1380);
    });

    muteButton.addEventListener("click", () => {
      toggleMute();
    });

    canvas.addEventListener("click", (event) => {
      if (!opened) return;
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      createInteractiveBurst(x, y);
    });

    window.addEventListener("resize", () => {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      layout();
    });

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function distance(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function withAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return "rgba(" + r + "," + g + "," + b + "," + Math.max(0, Math.min(1, alpha)) + ")";
    }

    layout();
  </script>
</body>
